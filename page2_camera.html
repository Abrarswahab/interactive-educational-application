<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>نطوق - التقاط صورة</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #eeeaf8; --purple: #7b6fd4; --purple-light: #a89de8;
    --purple-dark: #5a4fb0; --btn-blue: #5b8de8; --btn-blue-dark: #3d6fd4;
    --text-dark: #2d2557; --text-mid: #6b62a8; --white: #ffffff;
  }
  html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg); font-family: 'Tajawal', sans-serif; color: var(--text-dark); }
  .page { height: 100dvh; width: 100%; display: flex; flex-direction: column; align-items: center; position: relative; overflow: hidden; }
  .blob { position: absolute; border-radius: 50%; filter: blur(40px); opacity: 0.35; pointer-events: none; }
  .blob-1 { width: 220px; height: 220px; background: #c3b8f5; top: -60px; right: -60px; }
  .blob-2 { width: 180px; height: 180px; background: #f5c8e8; bottom: 80px; left: -50px; }
  .header { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 10px; z-index: 10; }
  .back-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--white); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 10px rgba(123,111,212,0.2); transition: transform 0.15s; }
  .back-btn:active { transform: scale(0.93); }
  .back-btn svg { width: 20px; height: 20px; }
  .header-title { font-size: 20px; font-weight: 800; color: var(--text-dark); }
  .char-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #c3b8f5, #f5c8e8); display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .instruction { margin: 6px 20px 12px; background: var(--white); border-radius: 18px; padding: 10px 16px; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 12px rgba(123,111,212,0.12); z-index: 10; }
  .instruction-icon { font-size: 24px; flex-shrink: 0; }
  .instruction p { font-size: 14px; font-weight: 500; color: var(--text-mid); line-height: 1.5; }
  .camera-wrapper { flex: 1; width: 100%; position: relative; display: flex; align-items: center; justify-content: center; padding: 0 16px; z-index: 5; }
  .camera-frame { width: 100%; max-width: 420px; aspect-ratio: 3/4; border-radius: 28px; overflow: hidden; position: relative; background: #1a1a2e; box-shadow: 0 8px 32px rgba(91,71,180,0.3); }
  #video, #canvas-preview { width: 100%; height: 100%; object-fit: cover; display: block; }
  #canvas-preview { display: none; position: absolute; inset: 0; }
  .cam-corner { position: absolute; width: 18px; height: 18px; border-color: rgba(255,255,255,0.5); border-style: solid; z-index: 3; }
  .cam-corner.tl { top: 12px; right: 12px; border-width: 2px 0 0 2px; border-top-left-radius: 4px; }
  .cam-corner.tr { top: 12px; left: 12px; border-width: 2px 2px 0 0; border-top-right-radius: 4px; }
  .cam-corner.bl { bottom: 12px; right: 12px; border-width: 0 0 2px 2px; border-bottom-left-radius: 4px; }
  .cam-corner.br { bottom: 12px; left: 12px; border-width: 0 2px 2px 0; border-bottom-right-radius: 4px; }
  .guide-square { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 62%; aspect-ratio: 1; border-radius: 20px; border: 2.5px solid rgba(200,185,255,0.9); z-index: 4; animation: glow-pulse 2.2s ease-in-out infinite; }
  .guide-label { position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%); font-size: 12px; font-weight: 600; color: rgba(210,200,255,0.9); white-space: nowrap; font-family: 'Tajawal', sans-serif; }
  @keyframes glow-pulse {
    0%,100% { box-shadow: 0 0 0 3px rgba(160,140,255,0.2),0 0 18px 4px rgba(160,140,255,0.35),inset 0 0 18px 2px rgba(160,140,255,0.1); border-color: rgba(200,185,255,0.85); }
    50%      { box-shadow: 0 0 0 5px rgba(160,140,255,0.35),0 0 32px 10px rgba(160,140,255,0.55),inset 0 0 24px 6px rgba(160,140,255,0.2); border-color: rgba(220,210,255,1); }
  }
  .scan-line { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 62%; aspect-ratio: 1; border-radius: 20px; overflow: hidden; z-index: 3; pointer-events: none; }
  .scan-line::after { content: ''; position: absolute; top: -40%; left: 0; right: 0; height: 40%; background: linear-gradient(transparent,rgba(180,160,255,0.12),transparent); animation: scan 2.8s ease-in-out infinite; }
  @keyframes scan { 0% { top: -40%; } 100% { top: 110%; } }
  .flash-overlay { position: absolute; inset: 0; background: white; border-radius: 28px; opacity: 0; z-index: 10; pointer-events: none; transition: opacity 0.05s; }
  .flash-overlay.active { opacity: 1; transition: opacity 0s; }
  .controls { width: 100%; padding: 14px 24px 24px; display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 10; }
  .shutter-row { display: flex; align-items: center; justify-content: center; gap: 32px; width: 100%; }
  .shutter-btn { width: 72px; height: 72px; border-radius: 50%; background: var(--white); border: 4px solid var(--purple-light); cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(123,111,212,0.35); transition: transform 0.12s; }
  .shutter-btn:active { transform: scale(0.92); }
  .shutter-inner { width: 52px; height: 52px; border-radius: 50%; background: linear-gradient(135deg,var(--purple),var(--purple-dark)); }
  .icon-btn { width: 46px; height: 46px; border-radius: 50%; background: rgba(255,255,255,0.7); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; transition: transform 0.12s; }
  .icon-btn:active { transform: scale(0.9); }
  .learn-btn { width: 100%; max-width: 360px; padding: 16px; border-radius: 22px; background: linear-gradient(135deg,var(--btn-blue),var(--btn-blue-dark)); border: none; color: white; font-family: 'Tajawal',sans-serif; font-size: 18px; font-weight: 800; cursor: pointer; box-shadow: 0 5px 20px rgba(91,141,232,0.45); transition: transform 0.14s; display: none; align-items: center; justify-content: center; gap: 10px; }
  .learn-btn.visible { display: flex; }
  .learn-btn:active { transform: scale(0.97); }
  .learn-btn-icon { width: 28px; height: 28px; background: rgba(255,255,255,0.25); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .cam-error { position: absolute; inset: 0; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: rgba(200,185,255,0.8); font-family: 'Tajawal',sans-serif; font-size: 15px; font-weight: 500; text-align: center; padding: 24px; border-radius: 28px; }
  .retake-btn { background: rgba(255,255,255,0.15); border: 1.5px solid rgba(255,255,255,0.4); border-radius: 50%; width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; transition: transform 0.12s; }
  .retake-btn:active { transform: scale(0.9); }
  @media (max-height: 700px) {
    .camera-frame { border-radius: 22px; }
    .shutter-btn { width: 62px; height: 62px; }
    .shutter-inner { width: 44px; height: 44px; }
    .controls { padding: 10px 24px 18px; gap: 10px; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <header class="header">
    <button class="back-btn" onclick="history.back()" aria-label="رجوع">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--purple)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </button>
    <span class="header-title">📸 وقت التصوير!</span>
    <div class="char-avatar" id="char-avatar">🧒</div>
  </header>

  <div class="instruction">
    <span class="instruction-icon">🎯</span>
    <p id="instruction-text">ضع الشيء داخل المربع المضيء ثم التقط الصورة</p>
  </div>

  <div class="camera-wrapper">
    <div class="camera-frame" id="camera-frame">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas-preview"></canvas>
      <div class="cam-corner tl"></div>
      <div class="cam-corner tr"></div>
      <div class="cam-corner bl"></div>
      <div class="cam-corner br"></div>
      <div class="guide-square" id="guide-sq"><span class="guide-label">ضع الشيء هنا</span></div>
      <div class="scan-line" id="scan-line"></div>
      <div class="flash-overlay" id="flash"></div>
      <div class="cam-error" id="cam-error" style="display:none;">
        <div style="font-size:44px">📷</div>
        <span>لم نتمكن من فتح الكاميرا<br>تأكد من إذن الكاميرا</span>
        <button onclick="startCamera()" style="margin-top:8px;padding:8px 20px;border-radius:12px;background:var(--purple);color:white;border:none;font-family:Tajawal,sans-serif;font-size:15px;font-weight:700;cursor:pointer;">حاول مجدداً</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="shutter-row" id="shutter-row">
      <button class="icon-btn" id="gallery-btn" title="اختر من المعرض">🖼️</button>
      <button class="shutter-btn" id="shutter-btn" onclick="capturePhoto()" aria-label="التقط صورة">
        <div class="shutter-inner"></div>
      </button>
      <button class="icon-btn" id="flip-btn" onclick="flipCamera()" title="قلب الكاميرا">🔄</button>
    </div>
    <button class="learn-btn" id="learn-btn" onclick="goToLearn()">
      <div class="learn-btn-icon">✨</div>
      تعلّم هذه الكلمة!
    </button>
  </div>
</div>

<script>
  const char = localStorage.getItem('natooq_char') || 'boy';
  document.getElementById('char-avatar').textContent = char === 'girl' ? '👧' : '🧒';

  let stream = null, facingMode = 'environment', capturedBlob = null, isCaptured = false;
  const video   = document.getElementById('video');
  const cvs     = document.getElementById('canvas-preview');
  const instrText = document.getElementById('instruction-text');

  // ─── Camera ──────────────────────────────────────────────────────────────
  async function startCamera() {
    document.getElementById('cam-error').style.display = 'none';
    try {
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode, width: { ideal: 1280 }, height: { ideal: 960 } },
        audio: false
      });
      video.srcObject = stream;
      video.style.display = 'block';
      cvs.style.display = 'none';
    } catch {
      document.getElementById('cam-error').style.display = 'flex';
      video.style.display = 'none';
    }
  }

  function flipCamera() {
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    const fb = document.getElementById('flip-btn');
    fb.style.transform = 'scale(0.9) rotate(180deg)';
    setTimeout(() => { fb.style.transform = ''; }, 300);
    startCamera();
  }

  // ─── Crop helpers ─────────────────────────────────────────────────────────
  /**
   * Returns the source crop rectangle (sx, sy, sw, sh) in actual video pixels
   * that corresponds to the guide square overlaid on the live <video> element.
   *
   * The video element uses object-fit:cover, so we need to account for the
   * letterbox/pillarbox offset before scaling.
   */
  function getCropCoords() {
    const guideEl = document.getElementById('guide-sq');
    const gRect   = guideEl.getBoundingClientRect();
    const vRect   = video.getBoundingClientRect();

    const vidW = video.videoWidth  || 640;
    const vidH = video.videoHeight || 480;
    const elW  = vRect.width;
    const elH  = vRect.height;

    // object-fit:cover scale factor and offset
    const videoAspect   = vidW / vidH;
    const elementAspect = elW  / elH;

    let renderW, renderH, offsetX, offsetY;
    if (videoAspect > elementAspect) {
      // video is wider than element → pillarboxed (cropped left/right)
      renderH  = elH;
      renderW  = elH * videoAspect;
      offsetX  = (elW - renderW) / 2;
      offsetY  = 0;
    } else {
      // video is taller than element → letterboxed (cropped top/bottom)
      renderW  = elW;
      renderH  = elW / videoAspect;
      offsetX  = 0;
      offsetY  = (elH - renderH) / 2;
    }

    // Guide square position relative to the rendered video surface
    const gLeft = gRect.left - vRect.left - offsetX;
    const gTop  = gRect.top  - vRect.top  - offsetY;

    // Scale from rendered CSS pixels → actual video pixels
    const scaleX = vidW / renderW;
    const scaleY = vidH / renderH;

    const sx = Math.round(gLeft       * scaleX);
    const sy = Math.round(gTop        * scaleY);
    const sw = Math.round(gRect.width  * scaleX);
    const sh = Math.round(gRect.height * scaleY);

    // Clamp to video bounds
    return {
      sx: Math.max(0, sx),
      sy: Math.max(0, sy),
      sw: Math.min(sw, vidW - Math.max(0, sx)),
      sh: Math.min(sh, vidH - Math.max(0, sy))
    };
  }

  /**
   * Same idea for a gallery image: figure out where the guide square sits
   * as a fraction of the camera-frame element, then map to image pixels.
   */
  function getCropCoordsForImage(img) {
    const guideEl  = document.getElementById('guide-sq');
    const frameEl  = document.getElementById('camera-frame');
    const gRect    = guideEl.getBoundingClientRect();
    const fRect    = frameEl.getBoundingClientRect();

    // The image is displayed with object-fit:cover inside the frame
    const imgAspect   = img.width  / img.height;
    const frameAspect = fRect.width / fRect.height;

    let renderW, renderH, offsetX, offsetY;
    if (imgAspect > frameAspect) {
      renderH = fRect.height;
      renderW = fRect.height * imgAspect;
      offsetX = (fRect.width - renderW) / 2;
      offsetY = 0;
    } else {
      renderW = fRect.width;
      renderH = fRect.width / imgAspect;
      offsetX = 0;
      offsetY = (fRect.height - renderH) / 2;
    }

    const gLeft = gRect.left - fRect.left - offsetX;
    const gTop  = gRect.top  - fRect.top  - offsetY;

    const scaleX = img.width  / renderW;
    const scaleY = img.height / renderH;

    const sx = Math.round(gLeft       * scaleX);
    const sy = Math.round(gTop        * scaleY);
    const sw = Math.round(gRect.width  * scaleX);
    const sh = Math.round(gRect.height * scaleY);

    return {
      sx: Math.max(0, sx),
      sy: Math.max(0, sy),
      sw: Math.min(sw, img.width  - Math.max(0, sx)),
      sh: Math.min(sh, img.height - Math.max(0, sy))
    };
  }

  // ─── Shared post-capture UI update ───────────────────────────────────────
  function onPhotoCaptured() {
    video.style.display = 'none';
    cvs.style.display = 'block';
    document.getElementById('guide-sq').style.display = 'none';
    document.getElementById('scan-line').style.display = 'none';
    isCaptured = true;
    document.getElementById('learn-btn').classList.add('visible');
    document.getElementById('shutter-btn').style.display = 'none';
    document.getElementById('flip-btn').style.display = 'none';
    document.getElementById('gallery-btn').style.display = 'none';
    instrText.textContent = 'رائع! 🎉 هل تريد تعلّم اسم هذا الشيء؟';
    const rb = document.createElement('button');
    rb.className = 'retake-btn';
    rb.innerHTML = '↩️';
    rb.title = 'التقاط من جديد';
    rb.onclick = retakePhoto;
    document.getElementById('shutter-row').appendChild(rb);
  }

  // ─── Capture (camera) ────────────────────────────────────────────────────
  function capturePhoto() {
    if (isCaptured) return;

    // Flash + shutter animation
    const flash = document.getElementById('flash');
    flash.classList.add('active');
    setTimeout(() => flash.classList.remove('active'), 120);
    const sb = document.getElementById('shutter-btn');
    sb.style.transform = 'scale(0.88)';
    setTimeout(() => { sb.style.transform = ''; }, 150);

    // Crop to guide square
    const { sx, sy, sw, sh } = getCropCoords();
    const ctx = cvs.getContext('2d');
    cvs.width  = sw;
    cvs.height = sh;
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, sw, sh);

    cvs.toBlob(blob => {
      capturedBlob = blob;
      onPhotoCaptured();
    }, 'image/jpeg', 0.92);
  }

  // ─── Retake ───────────────────────────────────────────────────────────────
  function retakePhoto() {
    isCaptured = false;
    capturedBlob = null;
    video.style.display = 'block';
    cvs.style.display = 'none';
    document.getElementById('guide-sq').style.display = 'block';
    document.getElementById('scan-line').style.display = 'block';
    document.getElementById('learn-btn').classList.remove('visible');
    document.getElementById('shutter-btn').style.display = 'flex';
    document.getElementById('flip-btn').style.display = 'flex';
    document.getElementById('gallery-btn').style.display = 'flex';
    instrText.textContent = 'ضع الشيء داخل المربع المضيء ثم التقط الصورة';
    const rb = document.querySelector('.retake-btn');
    if (rb) rb.remove();
  }

  // ─── Navigate to result ───────────────────────────────────────────────────
  function goToLearn() {
    if (!capturedBlob) return;
    const reader = new FileReader();
    reader.onload = e => {
      sessionStorage.setItem('natooq_image', e.target.result);
      window.location.href = 'page3_result.html';
    };
    reader.readAsDataURL(capturedBlob);
  }

  // ─── Gallery picker ───────────────────────────────────────────────────────
  document.getElementById('gallery-btn').addEventListener('click', () => {
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = 'image/*';
    inp.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;

      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        // Show the full image in the preview first so the guide square
        // is still rendered on top (it's hidden right after we grab coords)
        const frameEl  = document.getElementById('camera-frame');
        const fRect    = frameEl.getBoundingClientRect();

        // Temporarily show canvas with full image so getBoundingClientRect works
        const ctx = cvs.getContext('2d');
        cvs.width  = img.width;
        cvs.height = img.height;
        ctx.drawImage(img, 0, 0);
        video.style.display = 'none';
        cvs.style.display = 'block';

        // Wait one frame so layout is updated, then crop
        requestAnimationFrame(() => {
          const { sx, sy, sw, sh } = getCropCoordsForImage(img);
          cvs.width  = sw;
          cvs.height = sh;
          ctx.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);

          cvs.toBlob(blob => {
            capturedBlob = blob;
            onPhotoCaptured();
          }, 'image/jpeg', 0.92);
        });
      };
      img.src = url;
    };
    inp.click();
  });

  // ─── Init ─────────────────────────────────────────────────────────────────
  startCamera();
</script>
</body>
</html>
